<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>钉钉登录中...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .loading {
      text-align: center;
      color: #667085;
      font-size: 14px;
    }
    .spinner {
      border: 3px solid #e4e7ec;
      border-top: 3px solid #1677ff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>正在跳转到钉钉登录...</p>
  </div>
  <script>
    // 统一跳转到钉钉登录页，由页面内部判断是否处于钉钉环境
    window.location.href = '/dingtalk-login';
  </script>
</body>
</html>
